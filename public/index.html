<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Server Monitor — CS232</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0e17;
      --surface:   #111827;
      --surface2:  #1a2235;
      --border:    #1e2d45;
      --text:      #e2e8f0;
      --muted:     #64748b;
      --green:     #10b981;
      --yellow:    #f59e0b;
      --red:       #ef4444;
      --blue:      #3b82f6;
      --mono:      'IBM Plex Mono', monospace;
      --sans:      'IBM Plex Sans', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 32px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    .logo {
      font-family: var(--mono);
      font-size: 15px;
      color: var(--blue);
      letter-spacing: 0.05em;
    }
    .logo span { color: var(--muted); }
    .status-dot {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--muted);
      font-family: var(--mono);
    }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--green);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }

    /* ── Layout ── */
    main { padding: 28px 32px; max-width: 1200px; margin: 0 auto; }

    /* ── Section title ── */
    .section-title {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.12em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    /* ── Server cards ── */
    .server-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 16px;
      margin-bottom: 36px;
    }
    .server-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px;
      transition: border-color 0.2s;
    }
    .server-card:hover { border-color: var(--blue); }
    .server-card.critical { border-color: var(--red); }
    .server-card.warning  { border-color: var(--yellow); }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 16px;
    }
    .hostname {
      font-family: var(--mono);
      font-size: 14px;
      color: var(--text);
      font-weight: 500;
    }
    .env-badge {
      font-size: 10px;
      font-family: var(--mono);
      padding: 3px 8px;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .env-badge.production  { background: #1a2f1a; color: var(--green); }
    .env-badge.staging     { background: #2a2010; color: var(--yellow); }
    .env-badge.development { background: #1a1f2e; color: var(--blue); }

    .metric-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }
    .metric-label {
      font-size: 11px;
      font-family: var(--mono);
      color: var(--muted);
      width: 60px;
      flex-shrink: 0;
    }
    .bar-track {
      flex: 1;
      height: 6px;
      background: var(--surface2);
      border-radius: 3px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.6s ease;
    }
    .bar-fill.low    { background: var(--green); }
    .bar-fill.medium { background: var(--yellow); }
    .bar-fill.high   { background: var(--red); }
    .metric-value {
      font-family: var(--mono);
      font-size: 12px;
      width: 42px;
      text-align: right;
      color: var(--text);
    }

    /* ── Two-col layout for alerts + emails ── */
    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 36px;
    }
    @media (max-width: 720px) { .two-col { grid-template-columns: 1fr; } }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }
    .panel-header {
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.1em;
      color: var(--muted);
      text-transform: uppercase;
    }
    .panel-body { padding: 0; }

    .alert-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 18px;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
    }
    .alert-row:last-child { border-bottom: none; }
    .sev-badge {
      font-size: 9px;
      font-family: var(--mono);
      padding: 2px 7px;
      border-radius: 3px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      flex-shrink: 0;
    }
    .sev-badge.critical { background: #2d1515; color: var(--red); }
    .sev-badge.warning  { background: #2a1f0a; color: var(--yellow); }
    .alert-info { flex: 1; min-width: 0; }
    .alert-host { font-weight: 500; color: var(--text); font-size: 13px; }
    .alert-meta { color: var(--muted); font-size: 11px; font-family: var(--mono); margin-top: 2px; }
    .alert-time { font-family: var(--mono); font-size: 10px; color: var(--muted); flex-shrink: 0; }

    /* ── Test panel ── */
    .test-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 36px;
    }
    .test-panel h3 {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.1em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 16px;
    }
    .test-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: flex-end;
    }
    .field { display: flex; flex-direction: column; gap: 5px; }
    .field label { font-size: 11px; font-family: var(--mono); color: var(--muted); }
    .field select, .field input {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--mono);
      font-size: 13px;
      padding: 8px 12px;
      border-radius: 6px;
      outline: none;
    }
    .field select:focus, .field input:focus { border-color: var(--blue); }
    .field input { width: 100px; }
    .btn {
      background: var(--blue);
      color: white;
      border: none;
      padding: 9px 18px;
      border-radius: 6px;
      font-family: var(--mono);
      font-size: 13px;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.85; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .toast {
      margin-top: 12px;
      font-family: var(--mono);
      font-size: 12px;
      padding: 8px 12px;
      border-radius: 6px;
      display: none;
    }
    .toast.success { background: #0d2218; color: var(--green); display: block; }
    .toast.error   { background: #2d1515; color: var(--red);   display: block; }

    .empty { padding: 24px 18px; color: var(--muted); font-size: 13px; font-family: var(--mono); }
  </style>
</head>
<body>

<header>
  <div class="logo">SRV<span>/</span>MONITOR <span>— CS232</span></div>
  <div class="status-dot"><div class="dot"></div> LIVE</div>
</header>

<main>

  <!-- Server Cards -->
  <div class="section-title">Servers</div>
  <div class="server-grid" id="server-grid">
    <div class="empty">Loading servers...</div>
  </div>

  <!-- Alerts + Email Log -->
  <div class="two-col">
    <div class="panel">
      <div class="panel-header">Recent Alerts</div>
      <div class="panel-body" id="alert-list"><div class="empty">Loading...</div></div>
    </div>
    <div class="panel">
      <div class="panel-header">Email Log</div>
      <div class="panel-body" id="email-list"><div class="empty">Loading...</div></div>
    </div>
  </div>

  <!-- Test: Inject a Metric -->
  <div class="test-panel">
    <h3>Inject Test Metric (Viva Demo)</h3>
    <div class="test-row">
      <div class="field">
        <label>Server</label>
        <select id="t-server">
          <option value="SRV001">SRV001 — web-prod-01</option>
          <option value="SRV002">SRV002 — db-staging-02</option>
          <option value="SRV003">SRV003 — mail-dev-03</option>
        </select>
      </div>
      <div class="field">
        <label>Metric Type</label>
        <select id="t-type">
          <option value="cpu_usage">cpu_usage</option>
          <option value="memory_usage">memory_usage</option>
          <option value="disk_usage">disk_usage</option>
          <option value="network_usage">network_usage</option>
        </select>
      </div>
      <div class="field">
        <label>Value (%)</label>
        <input type="number" id="t-value" value="92" min="0" max="100"/>
      </div>
      <button class="btn" id="t-btn" onclick="injectMetric()">Send Metric</button>
    </div>
    <div class="toast" id="toast"></div>
  </div>

</main>

<script>
  const API = '';

  function getBarClass(v) {
    if (v >= 85) return 'high';
    if (v >= 60) return 'medium';
    return 'low';
  }

  function getCardClass(cpu, mem, disk) {
    const max = Math.max(cpu || 0, mem || 0, disk || 0);
    if (max >= 85) return 'critical';
    if (max >= 60) return 'warning';
    return '';
  }

  function metricRow(label, value) {
    if (value === null || value === undefined) {
      return `<div class="metric-row">
        <span class="metric-label">${label}</span>
        <div class="bar-track"><div class="bar-fill low" style="width:0%"></div></div>
        <span class="metric-value" style="color:#475569">N/A</span>
      </div>`;
    }
    const pct = Math.min(100, Math.max(0, parseFloat(value)));
    return `<div class="metric-row">
      <span class="metric-label">${label}</span>
      <div class="bar-track"><div class="bar-fill ${getBarClass(pct)}" style="width:${pct}%"></div></div>
      <span class="metric-value">${pct.toFixed(1)}%</span>
    </div>`;
  }

  async function loadServers() {
    try {
      const res  = await fetch(`${API}/api/servers`);
      const data = await res.json();
      const grid = document.getElementById('server-grid');
      if (!data.length) { grid.innerHTML = '<div class="empty">No servers found.</div>'; return; }

      grid.innerHTML = data.map(s => `
        <div class="server-card ${getCardClass(s.latest_cpu, s.latest_memory, s.latest_disk)}">
          <div class="card-header">
            <div>
              <div class="hostname">${s.hostname}</div>
              <div style="font-size:11px;color:var(--muted);font-family:var(--mono);margin-top:3px">${s.ip_address}</div>
            </div>
            <span class="env-badge ${s.environment}">${s.environment}</span>
          </div>
          ${metricRow('CPU', s.latest_cpu)}
          ${metricRow('MEM', s.latest_memory)}
          ${metricRow('DISK', s.latest_disk)}
        </div>
      `).join('');
    } catch (e) {
      document.getElementById('server-grid').innerHTML = '<div class="empty">Could not load servers.</div>';
    }
  }

  async function loadAlerts() {
    try {
      const res  = await fetch(`${API}/api/alerts`);
      const data = await res.json();
      const el   = document.getElementById('alert-list');
      if (!data.length) { el.innerHTML = '<div class="empty">No alerts yet.</div>'; return; }

      el.innerHTML = data.map(a => `
        <div class="alert-row">
          <span class="sev-badge ${a.severity}">${a.severity}</span>
          <div class="alert-info">
            <div class="alert-host">${a.hostname}</div>
            <div class="alert-meta">${a.metric_type} · ${parseFloat(a.metric_value).toFixed(1)}% > ${parseFloat(a.threshold).toFixed(0)}%</div>
          </div>
          <span class="alert-time">${new Date(a.triggered_at).toLocaleTimeString()}</span>
        </div>
      `).join('');
    } catch (e) {}
  }

  async function loadEmails() {
    try {
      const res  = await fetch(`${API}/api/emaillog`);
      const data = await res.json();
      const el   = document.getElementById('email-list');
      if (!data.length) { el.innerHTML = '<div class="empty">No emails sent yet.</div>'; return; }

      el.innerHTML = data.map(e => `
        <div class="alert-row">
          <span class="sev-badge ${e.severity}">${e.severity}</span>
          <div class="alert-info">
            <div class="alert-host">${e.recipient_email}</div>
            <div class="alert-meta">${e.hostname} · ${e.metric_type}</div>
          </div>
          <span class="alert-time" style="color:${e.status==='sent'?'var(--green)':'var(--red)'}">${e.status}</span>
        </div>
      `).join('');
    } catch (e) {}
  }

  async function injectMetric() {
    const btn    = document.getElementById('t-btn');
    const toast  = document.getElementById('toast');
    const server = document.getElementById('t-server').value;
    const type   = document.getElementById('t-type').value;
    const value  = parseFloat(document.getElementById('t-value').value);

    btn.disabled = true;
    toast.className = 'toast';
    toast.textContent = '';

    const metricId = `M_${Date.now()}`;
    try {
      const res = await fetch(`${API}/api/metrics`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ metric_id: metricId, server_id: server, metric_type: type, value, unit: 'percent' })
      });
      const data = await res.json();
      if (res.ok) {
        toast.textContent = `✅ Metric recorded (${type} = ${value}%). Check your email if threshold was breached!`;
        toast.className = 'toast success';
        setTimeout(loadAll, 1500);
      } else {
        toast.textContent = `❌ Error: ${data.error}`;
        toast.className = 'toast error';
      }
    } catch (e) {
      toast.textContent = `❌ Could not reach server.`;
      toast.className = 'toast error';
    }
    btn.disabled = false;
  }

  function loadAll() {
    loadServers();
    loadAlerts();
    loadEmails();
  }

  loadAll();
  setInterval(loadAll, 10000); // auto-refresh every 10 seconds
</script>
</body>
</html>
